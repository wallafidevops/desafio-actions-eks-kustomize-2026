  ci:
    name: Build e Push Dev
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - unit-testes
      - integration-testes
      # - sonarqube

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.300

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: ./src
        run: dotnet restore Review-Filmes.sln

      - name: Build
        working-directory: ./src
        run: dotnet build Review-Filmes.sln --no-restore

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.ARN_ROLE }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag curta
        id: meta
        run: |
          SHORT_SHA="${{ inputs.image_tag }}"
          SHORT_SHA="${SHORT_SHA::7}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Review-Filmes.Web/Dockerfile
          load: true
          push: false
          tags: |
            ${{ vars.ID_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.STAGE }}-review-filmes:${{ env.SHORT_SHA }}
            ${{ vars.ID_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.STAGE }}-review-filmes:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.23.0
        with:
          scan-type: image
          image-ref: ${{ vars.ID_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.STAGE }}-review-filmes:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-docker-result.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"


      - name: Upload SARIF para S3
        if: always()
        run: |
          aws s3 cp trivy-docker-result.sarif \
            s3://${{ secrets.BUCKET_PATH }}/dev/sast/review-filmes-${{ env.SHORT_SHA }}.sarif

      - name: Push da imagem
        run: |
          docker push ${{ vars.ID_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.STAGE }}-review-filmes:${SHORT_SHA}
          docker push ${{ vars.ID_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.STAGE }}-review-filmes:latest