name: Promote Image to Prod

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    outputs:
      image_tag:
        description: "Tag promovida"
        value: ${{ jobs.promote.outputs.image_tag }}
    secrets:
      ARN_ROLE:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    name: Promover imagem para prod
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 20

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.ID_ACCOUNT }}
      DEV_REPO: dev-review-filmes
      PRD_REPO: prd-review-filmes

    steps:
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.ARN_ROLE }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag
        id: meta
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          test -n "$IMAGE_TAG" || { echo "image_tag vazio"; exit 1; }
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Pull da imagem de dev
        run: |
          docker pull "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${DEV_REPO}:${IMAGE_TAG}"

      - name: Tag da imagem para prod
        run: |
          docker tag \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${DEV_REPO}:${IMAGE_TAG}" \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PRD_REPO}:${IMAGE_TAG}"

          docker tag \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${DEV_REPO}:${IMAGE_TAG}" \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PRD_REPO}:latest"

      - name: Push da imagem para prod
        run: |
          docker push "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PRD_REPO}:${IMAGE_TAG}"
          docker push "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PRD_REPO}:latest"