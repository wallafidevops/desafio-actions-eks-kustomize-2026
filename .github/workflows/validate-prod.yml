name: Validate Prod Promotion

on:
  workflow_call:
    outputs:
      image_tag:
        description: "Tag validada a partir do overlay dev"
        value: ${{ jobs.validate.outputs.image_tag }}
    secrets:
      ARN_ROLE:
        required: true
      GITOPS_TOKEN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validar imagem para promoção
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod

    outputs:
      image_tag: ${{ steps.get_tag.outputs.image_tag }}

    steps:
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.ARN_ROLE }}

      - name: Checkout repositório GitOps
        uses: actions/checkout@v4
        with:
          repository: wallafidevops/desafio-actions-eks-kustomize-2026
          ref: develop
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Obter tag atual do overlay dev
        id: get_tag
        run: |
          FILE="gitops/k8s/deploy/dev/kustomization.yaml"

          test -f "$FILE" || { echo "Arquivo não encontrado: $FILE"; exit 1; }

          IMAGE_TAG=$(awk '
            /newName: .*dev-review-filmes/ {found=1; next}
            found && /newTag:/ {print $2; exit}
          ' "$FILE")

          test -n "$IMAGE_TAG" || { echo "Não foi possível extrair a tag do overlay dev"; exit 1; }

          echo "Tag encontrada no dev: $IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Validar existência da imagem no ECR dev
        run: |
          aws ecr describe-images \
            --repository-name dev-review-filmes \
            --image-ids imageTag="${{ steps.get_tag.outputs.image_tag }}" \
            --region "${{ vars.AWS_REGION }}"