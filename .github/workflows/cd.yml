name: Deploy no Kubernetes

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      GITOPS_TOKEN:
        required: true
      ARGOCD_PASSWORD:
        required: true

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy ArgoCD
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    container:
      image: ghcr.io/wallafidevops/template-argocd-kustomize:0.1.0

    defaults:
      run:
        shell: /bin/bash -eo pipefail {0}

    env:
      AWS_ECR_URI: ${{ vars.ID_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      IMAGE_NAME: review-filmes
      IMAGE_TAG: ${{ inputs.image_tag }}
      ARGOCD_SERVER: argocd.app.wsnobrega.life
      ARGOCD_APP_NAME: review-filmes
      STAGE: ${{ inputs.environment }}
      GIT_BOT_USER: github-actions[bot]
      GIT_BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com


    steps:
      - name: Definir branch, overlay e repositório
        id: gitops
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "overlay=prd" >> $GITHUB_OUTPUT
            echo "repo_name=prd-${IMAGE_NAME}" >> $GITHUB_OUTPUT
          else
            echo "branch=develop" >> $GITHUB_OUTPUT
            echo "overlay=dev" >> $GITHUB_OUTPUT
            echo "repo_name=dev-${IMAGE_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repositório GitOps
        uses: actions/checkout@v4
        with:
          repository: wallafidevops/desafio-actions-eks-kustomize-2026
          ref: ${{ steps.gitops.outputs.branch }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
          persist-credentials: true

      - name: Configurar Git
        run: |
          git config --global user.name "$GIT_BOT_USER"
          git config --global user.email "$GIT_BOT_EMAIL"

      - name: Atualizar imagem no overlay
        run: |
          OVERLAY_DIR="gitops/k8s/deploy/${{ steps.gitops.outputs.overlay }}"

          test -d "$OVERLAY_DIR" || { echo "Overlay não encontrado: $OVERLAY_DIR"; exit 1; }

          cd "$OVERLAY_DIR"

          kustomize edit set image \
            "$AWS_ECR_URI/placeholder=$AWS_ECR_URI/${{ steps.gitops.outputs.repo_name }}:${IMAGE_TAG}"

      - name: Validar render do Kustomize
        run: |
          OVERLAY_DIR="gitops/k8s/deploy/${{ steps.gitops.outputs.overlay }}"
          kustomize build "$OVERLAY_DIR" >/dev/null

      - name: Commit e push no GitOps
        run: |
          git -C gitops add "k8s/deploy/${{ steps.gitops.outputs.overlay }}/kustomization.yaml"

          if git -C gitops diff --cached --quiet; then
            echo "Nenhuma mudança detectada."
            exit 0
          fi

          git -C gitops commit -m "[BOT][${STAGE^^}] Atualiza imagem para ${AWS_ECR_URI}/${{ steps.gitops.outputs.repo_name }}:${IMAGE_TAG}"
          git -C gitops push origin HEAD:${{ steps.gitops.outputs.branch }}

      - name: Sincronizar com ArgoCD
        run: |
          argocd login "$ARGOCD_SERVER" \
            --insecure \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --grpc-web

          argocd app sync "${STAGE}-${ARGOCD_APP_NAME}" --force --prune --grpc-web
          