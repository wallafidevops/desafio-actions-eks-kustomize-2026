apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: review-filmes-project
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/wallafidevops/desafio-actions-eks-kustomize-2026
  destinations:
    - name: cluster-dev
      namespace: dev-reviewfilmes
    - name: cluster-prd
      namespace: prd-reviewfilmes   # confira se é "prd-" ou "prod-"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
